name: 🚀 Feature Request
description: Propose a new feature, optimization, or capability for GhostNode
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve GhostNode? We'd love to hear about it! Please describe the use-case and proposal below.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem or limitation is.
      placeholder: E.g., I'm trying to use GhostNode with X datastore but the serialization mechanism is missing support for Y.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or workarounds you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, code snippets, or screenshots about the feature request here.
